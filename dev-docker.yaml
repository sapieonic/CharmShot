# ============================================================================
# CharmShot — DEVELOPMENT dependencies
#
# This stack runs only the *dependencies* the app needs locally — currently
# just MongoDB. The server itself is NOT started here; you run it on your host
# (`npm run dev`) so you get fast, native hot reload and easy debugging while
# talking to the containerized Mongo.
#
#   - mongo : MongoDB for application state (exposed on localhost:27017)
#
# S3 is a REAL (dev) bucket — provide AWS credentials and bucket names to the
# host process via a `.env` file or your shell (see README "Local development").
#
# Usage:
#   docker compose -f dev-docker.yaml up -d        # start MongoDB
#   npm run dev                                     # run the server on the host
#   # API: http://localhost:8080
#
# Point the host server at this Mongo with MONGODB_URI=mongodb://localhost:27017
# in your local `.env`. Stop with `docker compose -f dev-docker.yaml down`;
# add `-v` to also remove the Mongo data volume.
# ============================================================================

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongo-data:
