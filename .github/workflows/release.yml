name: Release

# Cuts a release on every push to main (a squash-merge produces exactly one such
# push). A push event is required because semantic-release (via env-ci) treats
# `pull_request`-triggered runs as PR builds and refuses to publish them. This is
# a deliberate exception to the "CI runs on pull requests only" policy, which
# governs the test/CI workflow — the release workflow needs the post-merge commit
# on main. semantic-release reads the merged commits, determines the next semver
# from Conventional Commits, then tags, generates the CHANGELOG, bumps
# package.json, and publishes a GitHub Release.
on:
  push:
    branches: [main]

# semantic-release needs to push the version/CHANGELOG commit + tag and create
# the GitHub Release.
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full history for version analysis)
        uses: actions/checkout@v4
        with:
          # Full history + tags so semantic-release can analyze commits since the
          # last release and compute the next version.
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable Husky git hooks. semantic-release's @semantic-release/git
          # makes the "chore(release): x.y.z" commit, whose body is the generated
          # CHANGELOG (long URL lines). The commit-msg hook would run commitlint
          # and fail on footer-max-line-length. Hooks are for local authoring;
          # the release commit is machine-generated, so skip them in CI.
          HUSKY: 0
        run: npx semantic-release
