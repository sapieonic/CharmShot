name: CI

# Runs ONLY on pull requests — never on direct branch pushes.
on:
  pull_request:

# Cancel superseded runs for the same ref (e.g. new push to an open PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: CI only needs to read the repository contents.
permissions:
  contents: read

jobs:
  # Detect whether anything that can affect test outcomes changed. The test jobs
  # below gate on this so doc-only / workflow-only PRs skip the (slow) unit and
  # integration suites. Beyond src/ and tests/, a dependency bump or a change to
  # the test/build config can break tests, so those files count as code too.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vitest.config.ts'
              - 'vitest.integration.config.ts'
              - 'tsconfig.json'

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Check OpenAPI spec is in sync
        run: npm run openapi:check

  unit-tests:
    name: Unit Tests (coverage)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  integration-tests:
    name: Integration Tests (MongoDB)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Real MongoDB provided as a service container, reachable at
    # mongodb://localhost:27017 so the integration suites execute (not skip).
    services:
      mongo:
        image: mongo:7
        ports:
          - '27017:27017'
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' --quiet || mongo --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests against MongoDB
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: charmshot_ci
        run: npm run test:integration

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Only build the image once the code is known-good: gate on lint/typecheck,
    # unit, and integration tests so we don't burn a Docker build on a red PR.
    needs: [lint-typecheck, unit-tests, integration-tests]
    # Tests are skipped on doc-only PRs; treat "skipped" as non-blocking and only
    # bail on an actual failure (default success() would skip us after a skip).
    if: >-
      always() &&
      needs.lint-typecheck.result == 'success' &&
      needs.unit-tests.result != 'failure' &&
      needs.integration-tests.result != 'failure'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build production image
        # Validates the multi-stage Dockerfile (deps install + tsc build +
        # runtime image) without pushing anywhere.
        run: docker build -t charmshot-backend:ci .
